<style>
    body {
      background-color: #131313;
      color: #e4e2e1;
      font-family: 'Manrope', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .ivory-gradient {
      background: radial-gradient(circle at center, #a1d2ab 0%, #1a472a 100%);
    }
    .glass-effect {
      background: rgba(31, 32, 32, 0.8);

<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#131313] dark:bg-[#131313] flex items-center justify-between px-6 h-16 w-full z-50 shadow-none">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">

</div>
<span class="text-2xl font-bold font-['Newsreader'] text-[#a1d2ab] tracking-tight">Dado Triple</span>
</div>
<button class="text-[#a1d2ab] active:scale-95 transition-transform hover:bg-white/5 transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined">signal_cellular_alt</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-6 py-20 mt-16 max-w-lg mx-auto w-full">
<!-- Hero Section -->
<div class="text-center mb-12">
<h1 class="text-5xl md:text-6xl font-['Newsreader'] font-bold text-on-primary-container leading-tight mb-4 italic tracking-tight">
        Bienvenido al Salón
      </h1>
<p class="font-['Manrope'] text-outline text-sm uppercase tracking-[0.2em]">
        Toma tu asiento en la mesa de honor
      </p>
</div>
<!-- Interactive Cards Grid (Asymmetric Layout) -->
<div class="grid grid-cols-1 gap-6 w-full">
<!-- Create Room Card -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container-low border border-outline-variant/10 hover:bg-surface-container transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'FILL' 1;">casino</span>
</div>
<div class="w-12 h-12 mb-6 rounded-xl bg-primary-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">crown</span>
</div>
<h2 class="font-['Newsreader'] text-3xl font-semibold text-primary mb-2">Crear Sala</h2>
<p class="text-outline text-sm max-w-[240px]">Inicia un nuevo juego y conviértete en el Croupier de la noche.</p>
<div class="mt-8 flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-secondary-container">
          Configurar Mesa
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
</div>
</button>
<!-- Join Room Card -->
<button class="group relative flex flex-col items-start p-8 rounded-xl bg-surface-container-highest border border-outline-variant/20 hover:bg-surface-bright transition-all duration-300 active:scale-95 text-left overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'FILL' 1;">key</span>
</div>
<div class="w-12 h-12 mb-6 rounded-xl bg-surface-container-low flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-3xl">group</span>
</div>
<h2 class="font-['Newsreader'] text-3xl font-semibold text-on-surface mb-2">Unirse a Sala</h2>
<p class="text-outline text-sm max-w-[240px]">Ingresa un código de acceso y entra en una partida activa.</p>
<div class="mt-8 flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-primary">
          Entrar Ahora
          <span class="material-symbols-outlined text-sm">login</span>
</div>
</button>
</div>
<!-- Secondary Invitation -->
<div class="mt-12 text-center">
<div class="flex items-center justify-center gap-4 mb-6">
<div class="h-px w-8 bg-outline-variant/30"></div>
<span class="text-outline-variant text-[10px] uppercase tracking-[0.3em]">Ambiente Privado</span>
<div class="h-px w-8 bg-outline-variant/30"></div>
</div>
<p class="text-on-surface-variant font-['Manrope'] text-sm leading-relaxed italic opacity-80">
        "Donde la estrategia se encuentra con la fortuna bajo el verde de la mesa."
      </p>
</div>

<!-- BottomNavBar (Suppressed for focused entry, showing simplified version as per request) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pb-6 pt-2 px-4 bg-[#131313]/80 backdrop-blur-lg border-t border-[#414942]/20 shadow-[0_-10px_30px_rgba(0,0,0,0.4)] md:hidden">
<!-- Home Active -->
<a class="flex flex-col items-center justify-center bg-[#1a472a] text-[#a1d2ab] rounded-xl px-6 py-2 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#353535] px-6 py-2 hover:text-[#a1d2ab] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">casino</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Games</span>
</a>
<a class="flex flex-col items-center justify-center text-[#353535] px-6 py-2 hover:text-[#a1d2ab] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Rankings</span>
</a>
</nav>

<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
