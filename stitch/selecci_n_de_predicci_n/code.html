<div class="flex items-center gap-4">

</div>
<h1 class="font-['Newsreader'] tracking-tight text-2xl font-bold text-[#a1d2ab] tracking-widest uppercase">THE GRAND SALON</h1>

<main class="min-h-screen pt-24 pb-32 px-6 felt-texture flex flex-col items-center">
<!-- Phase Header -->
<div class="text-center mb-10 mt-4">
<span class="font-label text-[10px] tracking-[0.3em] text-secondary uppercase mb-2 block">SALA DE JUEGO • DADO TRIPLE</span>
<h2 class="font-headline text-4xl md:text-5xl text-on-surface mb-2">FASE DE PREDICCIÓN</h2>
<p class="text-on-surface-variant font-body text-sm max-w-xs mx-auto opacity-80">Seleccione su destino en el tapete. El riesgo define la recompensa.</p>
</div>
<!-- Prediction Cards Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
<!-- Card: Zero (Selected State Example) -->
<button class="group relative flex flex-col items-start p-6 bg-primary-container border-2 border-secondary-container/50 rounded-xl card-shadow transition-all duration-300 scale-[1.02] text-left">
<div class="absolute top-4 right-4">
<span class="material-symbols-outlined text-secondary-container" style="font-variation-settings: 'FILL' 1;">stars</span>
</div>
<span class="font-headline text-3xl text-primary mb-1">Zero</span>
<p class="font-body text-sm text-on-surface-variant leading-relaxed mb-8">Predice que la suma será 0 (riesgo alto)</p>
<div class="mt-auto flex items-center gap-2">
<span class="font-label text-[10px] uppercase tracking-widest text-secondary-container bg-on-secondary-container/20 px-2 py-1 rounded">X50 MULTIPLIER</span>
</div>
</button>
<!-- Card: Min -->
<button class="group relative flex flex-col items-start p-6 bg-surface-container-low hover:bg-surface-container-high rounded-xl card-shadow transition-all duration-300 hover:-translate-y-1 text-left">
<div class="absolute top-4 right-4 opacity-20 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline">check_circle</span>
</div>
<span class="font-headline text-3xl text-on-surface mb-1">Min</span>
<p class="font-body text-sm text-on-surface-variant leading-relaxed mb-8">Suma total entre 1 y 10</p>
<div class="mt-auto flex items-center gap-2">
<span class="font-label text-[10px] uppercase tracking-widest text-outline bg-surface-container-highest px-2 py-1 rounded">X2 MULTIPLIER</span>
</div>
</button>
<!-- Card: More -->
<button class="group relative flex flex-col items-start p-6 bg-surface-container-low hover:bg-surface-container-high rounded-xl card-shadow transition-all duration-300 hover:-translate-y-1 text-left">
<div class="absolute top-4 right-4 opacity-20 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline">check_circle</span>
</div>
<span class="font-headline text-3xl text-on-surface mb-1">More</span>
<p class="font-body text-sm text-on-surface-variant leading-relaxed mb-8">Suma total entre 11 y 20</p>
<div class="mt-auto flex items-center gap-2">
<span class="font-label text-[10px] uppercase tracking-widest text-outline bg-surface-container-highest px-2 py-1 rounded">X2 MULTIPLIER</span>
</div>
</button>
<!-- Card: Max -->
<button class="group relative flex flex-col items-start p-6 bg-surface-container-low hover:bg-surface-container-high rounded-xl card-shadow transition-all duration-300 hover:-translate-y-1 text-left">
<div class="absolute top-4 right-4 opacity-20 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-outline">check_circle</span>
</div>
<span class="font-headline text-3xl text-on-surface mb-1">Max</span>
<p class="font-body text-sm text-on-surface-variant leading-relaxed mb-8">Suma total mayor a 21</p>
<div class="mt-auto flex items-center gap-2">
<span class="font-label text-[10px] uppercase tracking-widest text-outline bg-surface-container-highest px-2 py-1 rounded">X5 MULTIPLIER</span>
</div>
</button>
</div>

<button class="w-full py-4 px-8 bg-primary text-on-primary font-body font-bold text-sm tracking-[0.2em] rounded-xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                ENVIAR PREDICCIÓN
                <span class="material-symbols-outlined text-lg">send</span>
</button>
<!-- Contextual Note -->
<p class="mt-4 text-center text-[10px] text-outline font-label uppercase tracking-widest">

            </p>
