<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                    "on-surface-variant": "#c1c9bf",
                    "background": "#131313",
                    "surface-variant": "#353535",
                    "surface-container-low": "#1b1c1c",
                    "on-error": "#690005",
                    "tertiary": "#ffb3ac",
                    "primary-fixed-dim": "#a1d2ab",

                    "on-primary": "#08381d",
                    "surface-bright": "#393939",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed": "#410003",
                    "tertiary-container": "#83000d",
                    "on-surface": "#e4e2e1",
                    "on-secondary": "#402d00",
                    "surface-container-high": "#2a2a2a",
                    "outline": "#8b938a",
                    "inverse-on-surface": "#303030",
                    "primary-fixed": "#bdefc6",
                    "on-tertiary-fixed-variant": "#930010",
                    "secondary-fixed-dim": "#fbbc00",
                    "surface-container-lowest": "#0e0e0e",
                    "on-tertiary-container": "#ff867d",
                    "primary": "#a1d2ab",

                    "on-primary-fixed-variant": "#234f32",
                    "on-primary-container": "#85b590",
                    "tertiary-fixed": "#ffdad6",
                    "inverse-surface": "#e4e2e1",

                    "primary-container": "#1a472a",
                    "on-background": "#e4e2e1",

            "borderRadius": {

            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-salon-gradient {
            background: radial-gradient(circle at center, #1a472a 0%, #131313 100%);
        }
        .glass-panel {
            background: rgba(31, 32, 32, 0.8);
            backdrop-filter: blur(16px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Hero Background Element -->
<div class="fixed inset-0 z-0 bg-salon-gradient opacity-60"></div>
<div class="fixed inset-0 z-0 opacity-10 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDA6FBGFiiLIQHLHFSzOyxKKDG_MJ0sFjk4ZVozWo449tYEptYnP57rQfinLvxsVaf5lvcDdzu3p_J38PLa-AkgzVD5K-2x-1xektL6a_Vb1JZfOrLtoyZJLQixqjIDmF7eGXmAj5mZn7-5ATs6wAdIbFEj_CpAJ9cN2rLxDrBPMZnwJ1OcxKZMM4GaGQCpWAX2KZ_YtNYLXaaI_cj9CRytk_DpJw6WNR6mrhucSE1RiAMA2B2nKD1J0LMkLbn2ZYT4hdvFCD1NbQgw');"></div>
<main class="relative z-10 min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md space-y-12 text-center">
<!-- Branding/Symbol -->
<div class="flex justify-center items-center gap-4 mb-2">
<div class="h-px w-12 bg-primary/30"></div>
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center shadow-lg transform rotate-45">
<span class="material-symbols-outlined text-primary -rotate-45" style="font-variation-settings: 'FILL' 1;">casino</span>
</div>
<div class="h-px w-12 bg-primary/30"></div>
</div>
<!-- Header Section -->
<header class="space-y-4">
<h1 class="font-headline text-5xl md:text-6xl text-primary tracking-tight">
                    Identifícate
                </h1>
<p class="text-on-surface-variant font-label uppercase tracking-[0.2em] text-xs">
                    Entrada al Salón Privado
                </p>
</header>
<!-- Registration Form Card -->
<div class="glass-panel p-8 md:p-10 rounded-xl shadow-2xl relative overflow-hidden">
<!-- Decorative Light Bleed -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-[60px]"></div>
<form class="space-y-8 relative z-10">
<div class="space-y-3 text-left">
<label class="font-label text-[10px] uppercase tracking-widest text-outline ml-1" for="player-name">
                            Tu Alias de Juego
                        </label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant/30 text-on-surface px-0 py-4 text-xl focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-outline/40 font-headline italic" id="player-name" placeholder="Escribe tu nombre..." type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 bg-primary w-0 group-focus-within:w-full transition-all duration-500"></div>
</div>
</div>
<button class="w-full bg-secondary-container hover:bg-secondary-fixed text-on-secondary-container font-bold py-5 rounded-xl text-lg tracking-wide shadow-[0_10px_30px_rgba(255,191,0,0.15)] active:scale-95 transition-all duration-200 uppercase" type="submit">
                        Continuar
                    </button>
</form>
<!-- Footer Note inside the card -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 flex items-start gap-3 text-left">
<span class="material-symbols-outlined text-primary/60 text-sm mt-0.5">info</span>
<p class="text-outline text-sm leading-relaxed">
                        El nombre que elijas será visible para otros jugadores en las mesas y rankings globales.
                    </p>
</div>
</div>
<!-- Secondary Visual Context -->
<div class="flex justify-center items-center gap-8 opacity-40 grayscale pointer-events-none">
<div class="w-16 h-16 rounded-xl bg-surface-container-high flex items-center justify-center transform -rotate-12 border border-white/5">
<span class="material-symbols-outlined text-3xl">filter_3</span>
</div>
<div class="w-16 h-16 rounded-xl bg-surface-container-high flex items-center justify-center transform rotate-12 border border-white/5">
<span class="material-symbols-outlined text-3xl">filter_1</span>
</div>
<div class="w-16 h-16 rounded-xl bg-surface-container-high flex items-center justify-center transform -rotate-6 border border-white/5">
<span class="material-symbols-outlined text-3xl">filter_6</span>
</div>
</div>
</div>
</main>
<!-- Visual Anchor - Non-interactive Shell Mockup -->
<div class="fixed top-0 w-full flex items-center justify-between px-6 h-16 z-50 pointer-events-none">
<span class="font-headline tracking-tight text-2xl font-bold text-primary">Dado Triple</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-outline-variant/20"></div>
</div>
</body></html>
