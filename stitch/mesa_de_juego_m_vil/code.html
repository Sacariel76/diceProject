<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700;6..72,800&amp;family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

          extend: {
            "colors": {
                    "on-error-container": "#ffdad6",
                    "error-container": "#93000a",
                    "primary-fixed-dim": "#a1d2ab",

                    "secondary-fixed-dim": "#fbbc00",
                    "tertiary-fixed": "#ffdad6",
                    "secondary": "#ffe2ab",
                    "on-secondary": "#402d00",
                    "tertiary-container": "#83000d",
                    "primary-fixed": "#bdefc6",
                    "surface-container-highest": "#353535",
                    "tertiary": "#ffb3ac",
                    "on-tertiary": "#680008",
                    "inverse-primary": "#3b6848",
                    "on-primary-fixed-variant": "#234f32",
                    "on-tertiary-fixed-variant": "#930010",
                    "surface-container-lowest": "#0e0e0e",
                    "surface-tint": "#a1d2ab",
                    "on-surface": "#e4e2e1",
                    "error": "#ffb4ab",
                    "primary-container": "#1a472a",
                    "on-tertiary-container": "#ff867d",
                    "surface-container": "#1f2020",
                    "surface": "#131313",
                    "on-primary-fixed": "#00210d",
                    "on-primary-container": "#85b590",
                    "on-secondary-fixed-variant": "#5c4300",
                    "on-secondary-container": "#6d5000",
                    "on-error": "#690005",
                    "primary": "#a1d2ab",
                    "surface-variant": "#353535",
                    "on-primary": "#08381d",

                    "secondary-fixed": "#ffdfa0",
                    "on-secondary-fixed": "#261a00",
                    "on-background": "#e4e2e1",
                    "outline": "#8b938a",
                    "surface-dim": "#131313",
                    "outline-variant": "#414942",
                    "surface-bright": "#393939",
                    "surface-container-high": "#2a2a2a",
                    "on-tertiary-fixed": "#410003",
                    "surface-container-low": "#1b1c1c",
                    "tertiary-fixed-dim": "#ffb3ac",
                    "inverse-on-surface": "#303030",

            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-overlay {
        background: rgba(31, 32, 32, 0.8);
        backdrop-filter: blur(16px);
      }
      .dice-shadow {
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }
      .felt-texture {
        background: radial-gradient(circle at center, #1a472a 0%, #131313 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#131313] dark:bg-[#131313] z-50 flex items-center justify-between px-6 h-16 w-full shadow-none">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl overflow-hidden bg-surface-container-highest flex items-center justify-center">
<img alt="Player Profile" class="w-full h-full object-cover" data-alt="minimalist illustrated avatar of a modern poker player with stylish glasses and a neutral expression on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgQCfB3iH5PmZ6X2oq8YmxJApSBf4Wwx8_nIbDUju-C3GY4ZHHn30U4tmxWcONqVWREkQLzWFi-KBLSr2vJSaIsHTbm2Q6mQMReLyUHlirsoN5H8zOgK1k7uElPGU-_Dn14X2Ri7K4lkxQfc0Dv2puobP-HLtp3UPpmChXH5VEFMfWcferrCx6i6mX3eWT4-HDVEx0MC9cwIRmiozPWvH7RjT8SVz1Sc6A_aQhIiXqJw22qyqioOLcvk1gYHopAxjKo8taIy44QUgE"/>
</div>
<span class="text-2xl font-bold font-['Newsreader'] text-[#a1d2ab] tracking-tight">Dado Triple</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#a1d2ab] p-2 hover:bg-white/5 transition-colors rounded-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="signal_cellular_alt">signal_cellular_alt</span>
</button>
</div>
</header>
<main class="min-h-screen pt-16 pb-32 flex flex-col items-center justify-center felt-texture px-4 relative overflow-hidden">
<!-- Decorative Ambient Light -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 blur-[120px] pointer-events-none rounded-full"></div>
<!-- Central Play Area: The Dice Tray -->
<div class="relative z-10 w-full max-w-4xl flex flex-col items-center gap-12">
<div class="flex flex-wrap justify-center items-center gap-8 md:gap-16 py-12">
<!-- Dice 1 -->
<div class="relative group">
<div class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-highest rounded-xl dice-shadow flex items-center justify-center rotate-[-12deg] transition-transform group-hover:rotate-0">
<div class="grid grid-cols-3 grid-rows-3 gap-2 md:gap-3 p-4">
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
</div>
</div>
</div>
<!-- Dice 2 -->
<div class="relative group">
<div class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-highest rounded-xl dice-shadow flex items-center justify-center rotate-[8deg] transition-transform group-hover:rotate-0">
<div class="flex items-center justify-center">
<div class="w-4 h-4 md:w-6 md:h-6 rounded-full bg-secondary-container"></div>
</div>
</div>
</div>
<!-- Dice 3 -->
<div class="relative group">
<div class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-highest rounded-xl dice-shadow flex items-center justify-center rotate-[-5deg] transition-transform group-hover:rotate-0">
<div class="grid grid-cols-2 grid-rows-2 gap-4 md:gap-6 p-4">
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
<div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-secondary-container"></div>
</div>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="flex flex-col items-center gap-4">
<button class="bg-primary text-on-primary px-12 py-4 rounded-xl text-lg font-bold font-body tracking-wide hover:brightness-110 active:scale-95 transition-all shadow-xl shadow-primary/20">
                    Lanzar Dados
                </button>
<span class="text-primary/60 font-label uppercase tracking-[0.2em] text-[10px]">Turno de: Alejandro</span>
</div>
</div>
<!-- Bottom Score Panel -->
<section class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full max-w-2xl px-6 z-40">
<div class="bg-surface-container-low/90 backdrop-blur-md rounded-2xl p-6 flex items-center justify-between shadow-2xl border border-outline-variant/10">
<div class="flex gap-8">
<div class="flex flex-col">
<span class="text-outline font-label text-[10px] uppercase tracking-widest">Tú (Alejandro)</span>
<span class="font-headline text-3xl text-primary font-bold">1,240</span>
</div>
<div class="w-[1px] h-10 bg-outline-variant/20 self-center"></div>
<div class="flex flex-col">
<span class="text-outline font-label text-[10px] uppercase tracking-widest">Rival (Elena)</span>
<span class="font-headline text-3xl text-on-surface font-bold opacity-60">980</span>
</div>
</div>
<div class="flex items-center gap-2 bg-secondary-container/10 px-4 py-2 rounded-full">
<span class="material-symbols-outlined text-secondary-container text-sm" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-secondary-container font-label text-xs font-bold uppercase">Racha x3</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pb-6 pt-2 px-4 bg-[#131313]/80 backdrop-blur-lg rounded-t-xl border-t border-[#414942]/20 shadow-[0_-10px_30px_rgba(0,0,0,0.4)]">
<div class="flex flex-col items-center justify-center text-[#353535] px-6 py-2 hover:text-[#a1d2ab] transition-all active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#1a472a] text-[#a1d2ab] rounded-xl px-6 py-2 hover:text-[#a1d2ab] transition-all active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined" data-icon="casino">casino</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Games</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-6 py-2 hover:text-[#a1d2ab] transition-all active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-['Manrope'] text-[10px] uppercase tracking-widest mt-1">Rankings</span>
</div>
</nav>
<!-- Loading Modal Overlay (Small Modal) -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 glass-overlay">
<div class="bg-surface-container-high rounded-full px-8 py-4 flex items-center gap-4 shadow-2xl border border-outline-variant/20 animate-pulse">
<div class="w-5 h-5 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
<span class="font-label text-on-surface font-medium tracking-wide">Cargando jugada...</span>
</div>
</div>
</body></html>
