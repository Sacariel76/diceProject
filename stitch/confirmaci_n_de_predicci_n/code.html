<!DOCTYPE html>

                    "on-primary-fixed-variant": "#234f32",
                    "on-primary": "#08381d",
                    "error-container": "#93000a",
                    "on-secondary": "#402d00",
                    "primary-fixed": "#bdefc6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(31, 32, 32, 0.8);
            backdrop-filter: blur(16px);
        }
        .felt-gradient {
            background: radial-gradient(circle at center, #1a472a 0%, #131313 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-primary min-h-screen overflow-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] dark:bg-[#131313] flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a1d2ab] cursor-pointer active:opacity-70">menu</span>
<h1 class="text-2xl font-bold text-[#a1d2ab] tracking-widest uppercase font-['Newsreader'] tracking-tight">THE GRAND SALON</h1>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full border-2 border-primary-container overflow-hidden cursor-pointer">
<img alt="Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a sophisticated person in a tuxedo, soft moody lighting, luxury aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARKS0Pe_jrfaq4hWxVQUWoug-2OiL0kQ_bcCq6dbkaczMSeTwPGZu_dfXqtkrfg_KhNkteoiMXFf3glDQZym5CRoZpABbXRn_NNVoGN5t5vNdlMJg1PyFLqH8fwxBb5498vSMldEdPnHwxoPb8sb9L2D2qXqWl6yQ408Gi31EZujW8X-LIITVnvUkSxRQGXZUFByXsWkDgQN5qxZ6-NruNWI5oDDcxt01syAp7JWZwNcrpYQ3e60yT6foMSrXxcFYnSK237RPURPp9"/>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full bg-gradient-to-b from-[#1a472a] to-transparent h-1"></div>
</header>
<!-- Main Game Board (Background Content) -->
<main class="felt-gradient min-h-screen flex flex-col items-center justify-center pt-20 pb-24 px-6">
<!-- Visual Backdrop - Mocking a Table Layout -->
<div class="grid grid-cols-2 gap-8 w-full max-w-4xl opacity-40 grayscale pointer-events-none">
<div class="bg-surface-container-low h-64 rounded-xl border border-outline-variant/20 flex flex-col items-center justify-center p-6">
<span class="text-outline font-headline text-4xl mb-4">LESS</span>
<div class="w-24 h-36 bg-surface-container-highest rounded-lg shadow-xl flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-4xl text-outline">casino</span>
</div>
</div>
<div class="bg-surface-container-low h-64 rounded-xl border border-outline-variant/20 flex flex-col items-center justify-center p-6">
<span class="text-outline font-headline text-4xl mb-4">MORE</span>
<div class="w-24 h-36 bg-surface-container-highest rounded-lg shadow-xl flex items-center justify-center border border-outline-variant/30">
<span class="material-symbols-outlined text-4xl text-outline">casino</span>
</div>
</div>
</div>
</main>
<!-- Modal Overlay (Confirmación de Predicción Privada) -->
<div class="fixed inset-0 z-[60] flex items-center justify-center px-4">
<!-- Backdrop Blur -->
<div class="absolute inset-0 bg-surface-dim/90 backdrop-blur-sm"></div>
<!-- Modal Content -->
<div class="relative w-full max-w-md glass-panel rounded-full p-8 border border-outline-variant/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center text-center">
<!-- Decorative Icon -->
<div class="mb-6 w-16 h-16 bg-primary-container/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<!-- Prediction Label -->
<p class="text-on-surface-variant font-label text-sm uppercase tracking-[0.2em] mb-2">Tu Selección</p>
<h2 class="font-headline text-5xl text-primary mb-8 tracking-tight">MORE</h2>
<!-- Visual Card Representation -->
<div class="relative mb-10 w-32 h-48 bg-surface-container-highest rounded-xl border-2 border-primary/30 shadow-2xl flex flex-col items-center justify-between p-4 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
<div class="w-full flex justify-start">
<span class="font-headline text-2xl text-primary">M</span>
</div>
<span class="material-symbols-outlined text-5xl text-secondary-container" style="font-variation-settings: 'FILL' 1;">style</span>
<div class="w-full flex justify-end transform rotate-180">
<span class="font-headline text-2xl text-primary">M</span>
</div>
</div>
<!-- Message -->
<div class="bg-surface-container-lowest/50 rounded-xl p-6 mb-10">
<p class="text-on-surface text-lg leading-relaxed font-body">
                        Tu predicción es secreta. Los rivales no sabrán qué elegiste hasta el final de la ronda.
                    </p>
</div>
<!-- Actions -->
<div class="flex flex-col w-full gap-4">
<button class="w-full py-4 bg-secondary-container text-on-secondary-container font-bold text-lg rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest cursor-pointer">
                        CONFIRMAR
                    </button>
<button class="w-full py-3 text-outline hover:text-on-surface font-semibold text-sm transition-colors uppercase tracking-widest cursor-pointer">
                        CAMBIAR
                    </button>
</div>
</div>
</div>
</div>
<!-- Bottom Nav Bar (Suppressed via design rules if necessary, but included for shell consistency) -->
<nav class="fixed bottom-0 left-0 w-full h-20 bg-[#131313]/80 backdrop-blur-md flex justify-around items-center px-4 pb-safe z-50 rounded-t-xl border-t border-[#414942]/20 shadow-[0_-10px_30px_rgba(26,71,42,0.2)]">
<div class="flex flex-col items-center justify-center text-[#1a472a] bg-[#1a472a] rounded-xl px-4 py-2 text-[#a1d2ab] scale-95 active:scale-90 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">casino</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Table</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-2 hover:text-[#a1d2ab]/80 scale-95 active:scale-90 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">style</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Hand</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-2 hover:text-[#a1d2ab]/80 scale-95 active:scale-90 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">leaderboard</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-2 hover:text-[#a1d2ab]/80 scale-95 active:scale-90 transition-transform duration-200 cursor-pointer">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-['Manrope'] text-[10px] font-bold uppercase tracking-widest mt-1">Rules</span>
</div>
</nav>
