<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700&amp;family=Manrope:wght@400;500;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-container": "#6d5000",
                    "surface-tint": "#a1d2ab",
                    "outline-variant": "#414942",
                    "secondary-fixed": "#ffdfa0",
                    "on-secondary-fixed": "#261a00",
                    "surface-dim": "#131313",
                    "error": "#ffb4ab",
                    "surface": "#131313",
                    "secondary": "#ffe2ab",
                    "inverse-primary": "#3b6848",
                    "on-secondary-fixed-variant": "#5c4300",
                    "on-surface-variant": "#c1c9bf",
                    "background": "#131313",
                    "surface-variant": "#353535",
                    "surface-container-low": "#1b1c1c",
                    "on-error": "#690005",
                    "tertiary": "#ffb3ac",
                    "primary-fixed-dim": "#a1d2ab",
                    "on-primary-fixed": "#00210d",
                    "on-primary": "#08381d",
                    "surface-bright": "#393939",
                    "surface-container-highest": "#353535",
                    "on-tertiary-fixed": "#410003",
                    "tertiary-container": "#83000d",
                    "on-surface": "#e4e2e1",
                    "on-secondary": "#402d00",
                    "surface-container-high": "#2a2a2a",
                    "outline": "#8b938a",
                    "inverse-on-surface": "#303030",
                    "primary-fixed": "#bdefc6",
                    "on-tertiary-fixed-variant": "#930010",
                    "secondary-fixed-dim": "#fbbc00",
                    "surface-container-lowest": "#0e0e0e",
                    "on-tertiary-container": "#ff867d",
                    "primary": "#a1d2ab",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb3ac",
                    "on-primary-fixed-variant": "#234f32",
                    "on-primary-container": "#85b590",
                    "tertiary-fixed": "#ffdad6",
                    "inverse-surface": "#e4e2e1",
                    "surface-container": "#1f2020",
                    "primary-container": "#1a472a",
                    "on-background": "#e4e2e1",
                    "error-container": "#93000a",
                    "on-tertiary": "#680008",
                    "secondary-container": "#ffbf00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(31, 32, 32, 0.8);
            backdrop-filter: blur(16px);
        }
        .felt-gradient {
            background: radial-gradient(circle at center, #1a472a 0%, #131313 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center felt-gradient overflow-hidden">
<!-- Top Bar Placeholder (Suppressed as per task intent for focused transaction) -->
<main class="w-full max-w-md px-6 relative">
<!-- Background Texture Decor -->
<div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -right-24 w-64 h-64 bg-secondary-container/5 rounded-full blur-[100px]"></div>
<div class="glass-panel border border-outline-variant/10 rounded-3xl p-8 shadow-[0_20px_40px_rgba(0,0,0,0.5)] relative z-10">
<!-- Branding / Iconography -->
<div class="flex justify-center mb-8">
<div class="w-20 h-20 rounded-2xl bg-surface-container-highest flex items-center justify-center shadow-inner group transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="casino">casino</span>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl font-bold text-primary tracking-tight mb-2">Código de Invitación</h1>
<p class="font-body text-outline text-sm tracking-wide">Introduce los dígitos para unirte a la partida privada.</p>
</div>
<!-- Input Section (Digit Slots) -->
<div class="space-y-6">
<div class="flex justify-between gap-2 md:gap-3" id="otp-container">
<!-- Individual Slot 1 -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-error/40 flex items-center justify-center transition-all">
<span class="font-headline text-2xl text-on-surface">5</span>
</div>
<!-- Individual Slot 2 -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-error/40 flex items-center justify-center transition-all">
<span class="font-headline text-2xl text-on-surface">2</span>
</div>
<!-- Individual Slot 3 -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-error/40 flex items-center justify-center transition-all">
<span class="font-headline text-2xl text-on-surface">9</span>
</div>
<!-- Individual Slot 4 -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-error/40 flex items-center justify-center transition-all">
<span class="font-headline text-2xl text-on-surface">1</span>
</div>
<!-- Individual Slot 5 (Empty/Error State Focus) -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-error ring-1 ring-error flex items-center justify-center">
<span class="w-0.5 h-6 bg-primary animate-pulse rounded-full"></span>
</div>
<!-- Individual Slot 6 -->
<div class="w-full aspect-square max-w-[56px] bg-surface-container-highest rounded-xl border border-outline-variant/20 flex items-center justify-center">
<span class="text-outline/20 font-headline text-2xl">0</span>
</div>
</div>
<!-- Error Message -->
<div class="flex items-center gap-2 px-1 text-error">
<span class="material-symbols-outlined text-sm" data-icon="error">error</span>
<p class="font-label text-xs">Código no encontrado. Verifica con el anfitrión</p>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 px-6 bg-primary-container text-outline font-bold rounded-xl flex items-center justify-center gap-3 transition-all cursor-not-allowed opacity-50">
<span class="font-label text-sm uppercase tracking-widest">Entrar a la Mesa</span>
<span class="material-symbols-outlined text-xl" data-icon="login">login</span>
</button>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-10 pt-8 border-t border-outline-variant/10 text-center">
<button class="text-primary/80 hover:text-primary font-label text-xs uppercase tracking-tighter transition-colors">
                    ¿No tienes un código? Ver mesas públicas
                </button>
</div>
</div>
<!-- Decorative Elements -->
<div class="mt-12 flex justify-center gap-4">
<div class="px-4 py-2 bg-surface-container-low rounded-full flex items-center gap-2 border border-outline-variant/10 shadow-sm">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#a1d2ab]"></span>
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Servidor Activo</span>
</div>
<div class="px-4 py-2 bg-surface-container-low rounded-full flex items-center gap-2 border border-outline-variant/10 shadow-sm">
<span class="material-symbols-outlined text-xs text-outline" data-icon="lock">lock</span>
<span class="text-[10px] font-label text-outline uppercase tracking-widest">Encriptado</span>
</div>
</div>
</main>
<!-- Visual Polish: Floating Card Element Background -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] pointer-events-none opacity-20">
<div class="absolute top-0 right-0 rotate-12">
<div class="w-32 h-44 bg-surface-container-highest rounded-xl shadow-2xl border border-outline-variant/20 flex items-center justify-center p-4">
<span class="material-symbols-outlined text-6xl text-outline-variant/40" data-icon="style">style</span>
</div>
</div>
<div class="absolute bottom-10 left-0 -rotate-12">
<div class="w-32 h-44 bg-surface-container-highest rounded-xl shadow-2xl border border-outline-variant/20 flex items-center justify-center p-4">
<span class="material-symbols-outlined text-6xl text-outline-variant/40" data-icon="playing_cards">playing_cards</span>
</div>
</div>
</div>
</body></html>
