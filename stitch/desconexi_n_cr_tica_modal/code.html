<!DOCTYPE html>

                    "secondary-fixed": "#ffdfa0",

                    "tertiary-fixed": "#ffdad6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        .serif-font { font-family: 'Newsreader', serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface overflow-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 w-full bg-[#131313] bg-gradient-to-b from-[#1a472a] to-transparent">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a1d2ab] cursor-pointer" data-icon="menu">menu</span>
<h1 class="font-['Newsreader'] italic text-2xl text-[#a1d2ab] tracking-tight">THE GRAND SALON</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-[#a1d2ab] text-sm font-label uppercase tracking-widest">Balance: 24,500</span>
<div class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant/20 flex items-center justify-center overflow-hidden">
<img alt="Player Profile" data-alt="professional portrait of a sophisticated man in a dark suit with moody cinematic lighting and dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuArVebC1wM3Qa64yHNKhub5AfrC0_bkPE_oMuqnhifd7NJP1LOFSPYgfj3339ww7si7E3ckwB26yx0Z9OtikUnV2xr9Y4ylMET-ozHA1l49XDJz-9crsR7VY46B8UDvj1cet0ee9Aq6JARdTisyRqga0x1CdFHPzanSrHaa-ZnjWUZtUrOLdvrbnHAk_j5BdUVt_OvQoWIfp0I-YbLs9BkmwgDy_7q0GFHWGsWELmUUhCQhHBbxEEQDd803aJnId_qlElAHyQHnYQtJ"/>
</div>
</div>
</header>
<!-- Main Game Table Context -->
<main class="relative h-screen w-full flex items-center justify-center p-8 bg-surface overflow-hidden">
<!-- The Felt Table Surface -->
<div class="absolute inset-0 bg-gradient-to-b from-primary-container to-surface pointer-events-none opacity-40"></div>
<div class="relative w-full max-w-6xl aspect-[16/9] bg-primary-container/20 rounded-[4rem] border border-primary-container flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-from)_0%,_transparent_70%)] from-primary/10"></div>
<!-- Decorative Cards on Table -->
<div class="grid grid-cols-3 gap-12 opacity-20 grayscale pointer-events-none">
<div class="w-32 h-48 bg-surface-container-high rounded-xl border border-outline-variant/20 flex items-center justify-center">
<span class="material-symbols-outlined text-4xl" data-icon="casino">casino</span>
</div>
<div class="w-32 h-48 bg-surface-container-high rounded-xl border border-outline-variant/20 flex items-center justify-center -rotate-12 translate-y-8">
<span class="material-symbols-outlined text-4xl" data-icon="playing_cards">playing_cards</span>
</div>
<div class="w-32 h-48 bg-surface-container-high rounded-xl border border-outline-variant/20 flex items-center justify-center rotate-6 -translate-x-12">
<span class="material-symbols-outlined text-4xl" data-icon="style">style</span>
</div>
</div>
</div>
<!-- DISCONNECTION MODAL OVERLAY -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-surface-container-lowest/80 backdrop-blur-sm p-4">
<!-- Modal Box: Charcoal with subtle green border -->
<div class="relative w-full max-w-md bg-surface-container-low border border-primary-container/40 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] overflow-hidden">
<!-- Ambient Glow behind Icon -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-error-container/20 blur-[40px] rounded-full"></div>
<div class="relative p-8 flex flex-col items-center text-center">
<!-- Icon -->
<div class="mb-6 w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-error">
<span class="material-symbols-outlined text-4xl" data-icon="wifi_off">wifi_off</span>
</div>
<!-- Title: Conexión Perdida -->
<h2 class="serif-font text-3xl font-medium text-on-surface mb-3 tracking-tight">Conexión Perdida</h2>
<!-- Message -->
<p class="font-body text-on-surface-variant leading-relaxed mb-8 max-w-[280px]">
                        No se ha podido restablecer la conexión con el servidor.
                    </p>
<!-- Actions -->
<div class="flex flex-col w-full gap-3">
<!-- Primary: Reintentar in amber -->
<button class="w-full bg-secondary-container hover:bg-secondary-fixed-dim text-on-secondary-container font-label font-bold py-4 rounded-xl transition-all active:scale-95 uppercase tracking-widest text-xs">
                            Reintentar
                        </button>
<!-- Secondary: Salir in ivory outline -->
<button class="w-full bg-transparent border border-outline-variant/40 hover:bg-surface-container-highest text-on-surface font-label font-medium py-4 rounded-xl transition-all active:scale-95 uppercase tracking-widest text-xs">
                            Salir
                        </button>
</div>
</div>
<!-- Subtle Ivory Texture/Grain Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCjOuhjOJRXBUlD5gtwGj9Torg_G1OZxzwl_7S9tP1JkY8eOEfM2wc4jOIya01woDKEELwZt-EOqYyx9mdafTi_9VRjELYxoFym2UIVD2vQAugdOGpS7Q7brm2XIwJNwltE6P0-IdnpSo55jEnDe9pUhW_lT8qxCK3aXM5HApwnlwD9AX0x0Vqpwgtf8UzzW4bcl3IFtALoShMtb_sRNpJlIvxNWGWK-PjOzG5pZKkLijkoByKETpDca9XQlWt3D6Z-d3rCV8HzxUbY');"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full h-20 flex justify-around items-center px-4 pb-4 bg-[#131313]/80 backdrop-blur-md border-t border-[#414942]/20 z-50 rounded-t-xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1">
<span class="material-symbols-outlined mb-1" data-icon="casino">casino</span>
<span class="font-['Manrope'] uppercase tracking-widest text-[10px]">Table</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['Manrope'] uppercase tracking-widest text-[10px]">History</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1">
<span class="material-symbols-outlined mb-1" data-icon="groups">groups</span>
<span class="font-['Manrope'] uppercase tracking-widest text-[10px]">Lounge</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-['Manrope'] uppercase tracking-widest text-[10px]">Rules</span>
</div>
</nav>
</body></html>
