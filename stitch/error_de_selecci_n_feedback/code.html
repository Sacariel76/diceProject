<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#bdefc6",
                    "surface-container-highest": "#353535",
                    "on-surface": "#e4e2e1",
                    "on-tertiary-container": "#ff867d",
                    "error-container": "#93000a",
                    "outline": "#8b938a",
                    "on-secondary-fixed-variant": "#5c4300",
                    "on-error-container": "#ffdad6",
                    "tertiary-container": "#83000d",
                    "tertiary-fixed": "#ffdad6",
                    "on-tertiary-fixed": "#410003",
                    "inverse-surface": "#e4e2e1",
                    "on-secondary-fixed": "#261a00",
                    "surface-container-lowest": "#0e0e0e",
                    "on-secondary-container": "#6d5000",
                    "on-primary-fixed": "#00210d",
                    "surface-variant": "#353535",
                    "on-error": "#690005",
                    "surface-bright": "#393939",
                    "primary-container": "#1a472a",
                    "on-background": "#e4e2e1",
                    "inverse-on-surface": "#303030",
                    "secondary-fixed": "#ffdfa0",
                    "surface-container-high": "#2a2a2a",
                    "outline-variant": "#414942",
                    "primary-fixed-dim": "#a1d2ab",
                    "surface-container-low": "#1b1c1c",
                    "inverse-primary": "#3b6848",
                    "surface-container": "#1f2020",
                    "tertiary": "#ffb3ac",
                    "secondary": "#ffe2ab",
                    "on-primary-container": "#85b590",
                    "background": "#131313",
                    "tertiary-fixed-dim": "#ffb3ac",
                    "surface-tint": "#a1d2ab",
                    "on-tertiary": "#680008",
                    "secondary-container": "#ffbf00",
                    "surface-dim": "#131313",
                    "secondary-fixed-dim": "#fbbc00",
                    "on-primary": "#08381d",
                    "error": "#ffb4ab",
                    "primary": "#a1d2ab",
                    "on-primary-fixed-variant": "#234f32",
                    "surface": "#131313",
                    "on-tertiary-fixed-variant": "#930010",
                    "on-secondary": "#402d00",
                    "on-surface-variant": "#c1c9bf"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Newsreader"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .dice-shadow {
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .felt-texture {
            background-image: radial-gradient(circle at center, #1a472a 0%, #131313 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] dark:bg-[#131313] flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a1d2ab]" data-icon="casino">casino</span>
<h1 class="font-['Newsreader'] font-bold text-[#a1d2ab] tracking-tighter text-lg uppercase">DADO TRIPLE</h1>
</div>
<button class="font-['Newsreader'] uppercase tracking-widest text-lg text-[#353535] cursor-not-allowed">
            CONFIRM
        </button>
<div class="absolute bottom-0 left-0 w-full bg-gradient-to-b from-[#1a472a] to-transparent h-1"></div>
</header>
<!-- Main Content: The Table -->
<main class="min-h-screen pt-24 pb-32 flex flex-col items-center justify-center felt-texture px-6">
<!-- Player Info Section -->
<div class="w-full max-w-md mb-12 text-center">
<span class="text-on-surface-variant font-label text-xs tracking-widest uppercase mb-2 block">Current Turn</span>
<h2 class="font-headline text-4xl text-on-surface italic">Mariana S.</h2>
</div>
<!-- The Hand: Dice Selection Area -->
<div class="relative w-full max-w-2xl aspect-video md:aspect-auto flex flex-wrap justify-center gap-6 py-12">
<!-- Die 1: Selected -->
<div class="relative group">
<div class="w-20 h-20 bg-on-surface rounded-xl flex items-center justify-center dice-shadow border-4 border-primary ring-4 ring-primary/20 scale-105">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl" style="font-variation-settings: 'FILL' 1;">filter_4</span>
</div>
<div class="absolute -top-2 -right-2 bg-primary text-on-primary rounded-full p-1 shadow-lg">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Die 2: Selected -->
<div class="relative group">
<div class="w-20 h-20 bg-on-surface rounded-xl flex items-center justify-center dice-shadow border-4 border-primary ring-4 ring-primary/20 scale-105">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl" style="font-variation-settings: 'FILL' 1;">filter_2</span>
</div>
<div class="absolute -top-2 -right-2 bg-primary text-on-primary rounded-full p-1 shadow-lg">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Die 3: NOT Selected -->
<div class="relative group opacity-40">
<div class="w-20 h-20 bg-surface-container-highest rounded-xl flex items-center justify-center border-2 border-outline/20">
<span class="material-symbols-outlined text-on-surface-variant text-4xl">filter_6</span>
</div>
</div>
<!-- Die 4: NOT Selected -->
<div class="relative group opacity-40">
<div class="w-20 h-20 bg-surface-container-highest rounded-xl flex items-center justify-center border-2 border-outline/20">
<span class="material-symbols-outlined text-on-surface-variant text-4xl">filter_1</span>
</div>
</div>
<!-- Die 5: NOT Selected -->
<div class="relative group opacity-40">
<div class="w-20 h-20 bg-surface-container-highest rounded-xl flex items-center justify-center border-2 border-outline/20">
<span class="material-symbols-outlined text-on-surface-variant text-4xl">filter_3</span>
</div>
</div>
</div>
<!-- Error Feedback Area -->
<div class="mt-8 flex flex-col items-center gap-6 w-full max-w-sm">
<!-- Warning Banner -->
<div class="bg-error-container/80 backdrop-blur-md border border-error/20 px-6 py-3 rounded-full flex items-center gap-3 animate-pulse">
<span class="material-symbols-outlined text-error text-sm" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="font-label text-[10px] font-bold tracking-widest text-on-error-container uppercase">
                    SELECCIONA 3 DADOS PARA CONTINUAR
                </p>
</div>
<!-- Primary Action (Disabled) -->
<button class="w-full py-4 rounded-xl bg-surface-container-highest text-outline font-label font-bold tracking-[0.2em] uppercase cursor-not-allowed opacity-60" disabled="">
                PRESENTAR JUGADA
            </button>
<p class="text-on-surface-variant/60 font-label text-[10px] uppercase tracking-tighter">
                Faltan 1 dado por seleccionar
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center pb-6 pt-3 px-4 bg-[#131313]/80 backdrop-blur-md dark:bg-[#131313]/80 rounded-t-xl z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1 hover:text-[#a1d2ab] transition-colors active:translate-y-0.5 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="grid_view">grid_view</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Table</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#1a472a] text-[#a1d2ab] rounded-xl px-4 py-1 active:translate-y-0.5 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" data-icon="playing_cards">playing_cards</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Hand</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1 hover:text-[#a1d2ab] transition-colors active:translate-y-0.5 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-[#353535] px-4 py-1 hover:text-[#a1d2ab] transition-colors active:translate-y-0.5 duration-150">
<span class="material-symbols-outlined mb-1" data-icon="menu_book">menu_book</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-wider">Rules</span>
</div>
</nav>
</body></html>
